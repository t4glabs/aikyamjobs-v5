# NGINX Configuration for beta.aikyamjobs.org
# File: /etc/nginx/sites-available/beta.aikyamjobs.org

# Upstream definitions
upstream strapi_beta {
    server 127.0.0.1:1338;
    keepalive 64;
}

upstream nextjs_beta {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name beta.aikyamjobs.org;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name beta.aikyamjobs.org;

    # SSL configuration (certbot will add these)
    ssl_certificate /etc/letsencrypt/live/beta.aikyamjobs.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.aikyamjobs.org/privkey.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Max upload size (for Strapi uploads)
    client_max_body_size 100M;

    # Strapi API endpoints
    location /api {
        proxy_pass http://strapi_beta;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi uploads
    location /uploads {
        proxy_pass http://strapi_beta;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        
        # Cache images for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Strapi admin panel
    location /admin {
        proxy_pass http://strapi_beta;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static files
    location /_next/static {
        proxy_pass http://nextjs_beta;
        proxy_cache_bypass $http_upgrade;
        
        # Cache static files for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js frontend (everything else)
    location / {
        proxy_pass http://nextjs_beta;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
